 
<!DOCTYPE HTML>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title> Coordenadas Mouse </title>
<style>
	
    body {
    	height: 100vh;
        width: 100vw;
        overflow: hidden;
        cursor: crosshair;
        margin: 0;
        font-family: "Consola", sans-serif;
        color: rgb(39, 166, 23)
    }
    
    #plano {
    	display: flex;
        flex-direction: column;
    	justify-content: center;
        align-items: center;
        height: 100%;
        width: 100%;
    	background-color: rgb(17, 17, 19);
    }
    
    #elemento {
    	width: 400px;
    	height: 400px;
    	border: 3px dashed rgb(39, 166, 23);
    }
    
    #debug {
    	display: flex;
        justify-content: center;
    	width: 400px;
        height: 180px;
        margin-top: 30px;
    }
    
    #debug div {
    	width: 100%;
    	margin-left: 30px;
    }
    
    #debug div:first-child {
    	border-right: 3px dashed rgb(39, 166, 23);
        margin-left: 0px;
    }
    
    #debug h2 {
    	font-size: 22pt;
    }
    
    #debug p, span {
    	font-size: 18pt;
    }
    
    #debug span {
    	margin-left: 15px;
    }
    
        
</style>
</head>
<body>
	<main id="plano">
    	<section id="elemento">
        </section>
        <section id="debug">
        	<div>
            	<h2>Global</h2>
                <p>X:<span id="globalx">--</span></p>
                <p>Y:<span id="globaly">--</span></p>
            </div>
            <div>
            	<h2>Local</h2>
                <p>X:<span id="localx">--</span></p>
                <p>Y:<span id="localy">--</span></p>
			</div>
        </section>
    </main>
</body>
<script>
	const plano = document.getElementById("plano");
    const elemento = document.getElementById("elemento");
    const localx = document.getElementById("localx");
    const localy = document.getElementById("localy");
    const globalx = document.getElementById("globalx");
    const globaly = document.getElementById("globaly");
    
	plano.addEventListener("mousemove", (e) => {
	const rect = plano.getBoundingClientRect();
    const mouseX = e.clientX;
    const mouseY = e.clientY;
    
    globalx.innerText = `${Math.round(mouseX)}`;
    globaly.innerText = `${Math.round(mouseY)}`;
    });
    
    elemento.addEventListener("mousemove", (e) => {
    const rect = elemento.getBoundingClientRect();
    const mouseX = e.clientX;
    const mouseY = e.clientY;
    const locX = mouseX - rect.left;
    const locY = mouseY - rect.top;
    
    localx.innerText = `${Math.round(locX)}`;
    localy.innerText = `${Math.round(locY)}`;
    });
</script>
</html>
