<!DOCTYPE html>
<html>
<head>
<title>Primeiro Card 3D</title>
<style>

body {
	display: flex;
	justify-content: center;
	align-items: center;
	height: 100vh;
	background-color: black;
	font-family: "Comic Sans", sans-serif;
}

.card {
	width: 290px;
	height: 400px;
	padding: 10px;
	color: white;
	cursor: pointer;
    transition: box-shadow .1s;
	perspective: 1000px;
	border-radius: 0 50px 0 50px;
    box-shadow: 0px 0px 0px yellow;
}

#conteudo {
	margin-left: 15px;
    filter: grayscale(100%);
    opacity: 10%;
    transition: .5s;
}

.card:hover #conteudo {
	filter:grayscale(0%);
    opacity: 100%;
}

h1 {
	font-size: 20pt;
	margin-right: 50px;
}

#um {
	font-size: 15pt;
}

#dois {
	margin-right: 50px;
	font-size: 15pt;
}

#um, #dois {
	color: cyan;
}

h2 {
	margin-top: 100px;
	font-size: 18pt;
}

h1, h2 {
color: yellow;
}

#test {
color: white;
font-size: 20pt;
}

</style>
</head>
<body>
	<section class="card">
    	<section id="conteudo">
        	<h1>Nova Habilidade: Efeito 3D</h1>
            <p id="um">+ Efeito 3D para elementos</p>
            <p id="dois">+ Controle de posição do: mouse, elementos e rotação</p>
            <H2>@Pátejo_Coder</h2>
        </section>
	</section>
    <div id="test"></div>
</body>
<script>
	const test = document.getElementById("test");
	const card = document.querySelector(".card");
    
    card.addEventListener("mousemove", (mouse) => {
    const rect = card.getBoundingClientRect();
    const x = mouse.clientX;
    const y = mouse.clientY;
    const cardX = x - rect.left;
    const cardY = y - rect.top;
    const centerX = (rect.width / 2) - cardX;
    const centerY = (rect.height / 2) - cardY;
    
    
 	card.style.boxShadow = `${centerX / 6}px ${centerY / 6}px yellow`;
    
    });
    
    card.addEventListener("mouseleave", () => {
    card.style.boxShadow = `0px 0px`; 
    });

</script>
</html>
